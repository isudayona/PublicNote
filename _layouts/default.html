<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      max-width: 760px;
      margin: 2em auto;
      padding: 0 1em;
      line-height: 1.7;
      color: #24292e;
    }
    h1, h2, h3, h4, h5, h6 {
      color: #1b1f23;
      margin-top: 1.5em;
      margin-bottom: 0.6em;
    }
    h1 { font-size: 1.8em; border-bottom: 1px solid #e1e4e8; padding-bottom: 0.3em; }
    h2 { font-size: 1.5em; border-bottom: 1px solid #e1e4e8; padding-bottom: 0.3em; }
    h3 { font-size: 1.25em; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      background: #f6f8fa;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.9em;
    }
    pre {
      background: #f6f8fa;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
    }
    pre code { background: none; padding: 0; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    th, td {
      border: 1px solid #d1d5da;
      padding: 0.6em 0.8em;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f6f8fa; }
    blockquote {
      border-left: 4px solid #d1d5da;
      padding-left: 1em;
      color: #6a737d;
      margin: 1em 0;
    }
    ul, ol { padding-left: 2em; }
    hr { border: 0; border-top: 1px solid #e1e4e8; margin: 2em 0; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
